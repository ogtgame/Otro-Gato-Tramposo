<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Contacto — O.G.T.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #F5A623;
      --accent-grad: linear-gradient(135deg, #F5C842 0%, #F5A623 50%, #E8845A 100%);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }
    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100dvh;
      padding: calc(24px + var(--safe-top)) 20px calc(40px + var(--safe-bottom));
      max-width: 480px;
      margin: 0 auto;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      color: #fff;
      line-height: 1;
      margin-bottom: 4px;
    }
    .logo span { color: var(--accent); }
    .subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.1em;
      font-weight: 600;
      margin-bottom: 32px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .description {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.5);
    }
    input, textarea, select {
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      color: #fff;
      font-family: inherit;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
    }
    input::placeholder, textarea::placeholder {
      color: rgba(255,255,255,0.25);
    }
    select option { background: #111; }
    textarea {
      resize: vertical;
      min-height: 120px;
      line-height: 1.5;
    }
    .btn-submit {
      width: 100%;
      padding: 17px;
      background: var(--accent-grad);
      color: #000;
      font-weight: 800;
      font-size: 1rem;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 8px;
      min-height: 58px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-submit:active { transform: scale(0.97); opacity: 0.9; }

    .success-msg {
      display: none;
      background: rgba(80,200,80,0.08);
      border: 1.5px solid rgba(80,200,80,0.3);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      color: #7ddb7d;
      font-size: 0.95rem;
      font-weight: 600;
      margin-top: 16px;
    }

    .contact-info {
      margin-top: 32px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .contact-info-title {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.4);
    }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.88rem;
      color: rgba(255,255,255,0.7);
    }
    .contact-item span:first-child { font-size: 1.1rem; }
    a { color: var(--accent); text-decoration: none; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 12px 20px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="logo">O.G.<span>T</span>.</div>
  <div class="subtitle">OTRO GATO TRAMPOSO</div>

  <h1>Contacto</h1>
  <p class="description">¿Tenés alguna pregunta, sugerencia o encontraste un bug? Mandanos un mensaje y te respondemos a la brevedad.</p>

  <form id="contact-form" onsubmit="handleSubmit(event)">

    <div class="form-group">
      <label>Tu nombre</label>
      <input type="text" id="nombre" placeholder="Cómo te llamás" required maxlength="60" autocomplete="name" />
    </div>

    <div class="form-group">
      <label>Tu email</label>
      <input type="email" id="email" placeholder="tucorreo@ejemplo.com" required autocomplete="email" />
    </div>

    <div class="form-group">
      <label>Asunto</label>
      <select id="asunto">
        <option value="bug">🐛 Reportar un bug</option>
        <option value="sugerencia">💡 Sugerencia o idea</option>
        <option value="contenido">🃏 Proponer cartas nuevas</option>
        <option value="privacidad">🔒 Consulta sobre privacidad</option>
        <option value="otro">📩 Otro</option>
      </select>
    </div>

    <div class="form-group">
      <label>Mensaje</label>
      <textarea id="mensaje" placeholder="Contanos qué pasó o qué tenés en mente..." required maxlength="1000"></textarea>
    </div>

    <button type="submit" class="btn-submit">✉️ Enviar mensaje</button>

    <div class="success-msg" id="success-msg">
      ✅ ¡Mensaje enviado! Te respondemos a la brevedad.
    </div>

  </form>

  <div class="contact-info">
    <div class="contact-info-title">También podés encontrarnos en</div>
    <div class="contact-item">
      <span>📋</span>
      <span><a href="privacidad.html">Política de Privacidad</a></span>
    </div>
    <div class="contact-item">
      <span>📄</span>
      <span><a href="terminos.html">Términos y Condiciones</a></span>
    </div>
  </div>

  <a class="back-btn" href="/">← Volver al juego</a>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      const nombre  = document.getElementById('nombre').value.trim();
      const email   = document.getElementById('email').value.trim();
      const asunto  = document.getElementById('asunto').value;
      const mensaje = document.getElementById('mensaje').value.trim();

      // Armar mailto como fallback simple
      const subject = encodeURIComponent(`OGT Contacto: ${asunto} — ${nombre}`);
      const body    = encodeURIComponent(`Nombre: ${nombre}\nEmail: ${email}\nAsunto: ${asunto}\n\n${mensaje}`);
      window.location.href = `mailto:contacto@ogt.com?subject=${subject}&body=${body}`;

      document.getElementById('success-msg').style.display = 'block';
      e.target.reset();
    }
  </script>

</body>
</html>
